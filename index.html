<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>40 Hadith App</title>
    <link rel="stylesheet" href="style.css">
    <!-- Beautiful fonts for perfect rendering -->
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>

    <!-- Top Sticky Navigation -->
    <header>
        <div class="header-container">
            <div class="brand">
                <span class="logo-icon">📖</span>
                <h1>Al-Arba'in (40 Hadith)</h1>
                <h3> Presented by AMBER ZAHRA</h3>
            </div>
            <button id="theme-toggle" class="btn-theme" aria-label="Toggle Dark/Light Mode">
                <span class="mode-text">Dark Mode</span> 🌓
            </button>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="container">
        <div id="hadith-container" class="hadith-grid">
            <!-- All 40 Hadiths will load here perfectly via JS -->
        </div>
    </main>

    <!-- Fixed Footer -->
    <footer>
        <p>© 2026 Al-Arba'in | Designed with Clean & Smooth Aesthetics</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
